<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="js/main.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link href='https://fonts.googleapis.com/css?family=Lato' rel='stylesheet'>
    <title>Tic Tac Toe</title>
</head>

<body>
    <header>
        <h1 class="title">Tic Tac Toe</h1>
        <p class="description" ch="40">The goal of the game in tic-tac-toe is to fill an entire row, column, or diagonal
            with
            their marks. Play continues until someone achieves this goal.</p>
    </header>
    <section class="game-board">
        <section class="player-board">
            <div class="player active">Player 1</div>
            <div class="player">Player 2</div>
        </section>
        <section class="game-grid">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </section>
    </section>
    <section class="game-controls">
        <button class="btn-restart">Restart game</button>
    </section>
    <footer>
        <p>The game made with <span>♥</span> by Michał Baran</p>
    </footer>

</body>

</html>
